name: quanlythieunhi
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  http: ^1.6.0
  provider: ^6.1.1
  mobile_scanner: ^3.5.7
  shared_preferences: ^2.2.2
  share_plus: ^10.1.0
  url_launcher: ^6.3.2
  path_provider: ^2.1.2
  excel: ^4.0.0
  fl_chart: ^0.66.0
  package_info_plus: ^9.0.0
  qr_flutter: ^4.1.0
  gal: ^2.3.2
  permission_handler: ^11.3.0
  intl: ^0.19.0
  image_picker: ^1.1.2
  file_picker: ^8.1.7
  open_filex: ^4.5.0
  google_fonts: ^8.0.2
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  web:
    generate: true
    image_path: "image/app_icon.png"
    background_color: "#FFFFFF"
    theme_color: "#FFFFFF"
  image_path: "image/app_icon.png"
  adaptive_icon_background: "#FFFFFF" # Đây là màu xanh dương lấy từ logo của bạn
  adaptive_icon_foreground: "image/app_icon.png"

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
